document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ted Grotesk',sans-serif;font-weight:700;font-size:19px;color:#FAFAF8;\">Swish Dental Heights<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#908EA8;margin-top:4px;\">swishsmiles.com · 5 items reviewed<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center;\">\n              <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:26px;color:#F0B429;\">35%<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:#908EA8;\">LAUNCH READY<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;background:#2B2A3C;border-radius:8px;padding:10px 13px;\"><span style=\"font-size:12.5px;color:#CDCCDA;\">No primary CTA above the fold<\u002Fspan><span style=\"background:#4A2530;color:#F08A75;font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:3px 8px;border-radius:4px;\">FAIL<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;background:#2B2A3C;border-radius:8px;padding:10px 13px;\"><span style=\"font-size:12.5px;color:#CDCCDA;\">Hero uses auto rotating carousel<\u002Fspan><span style=\"background:#4A2530;color:#F08A75;font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:3px 8px;border-radius:4px;\">FAIL<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;background:#2B2A3C;border-radius:8px;padding:10px 13px;\"><span style=\"font-size:12.5px;color:#CDCCDA;\">Schema missing aggregateRating<\u002Fspan><span style=\"background:#453A22;color:#F0B429;font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:3px 8px;border-radius:4px;\">CAUTION<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;background:#2B2A3C;border-radius:8px;padding:10px 13px;\"><span style=\"font-size:12.5px;color:#CDCCDA;\">Unclear value proposition in hero<\u002Fspan><span style=\"background:#453A22;color:#F0B429;font-family:'JetBrains Mono',monospace;font-size:9.5px;padding:3px 8px;border-radius:4px;\">CAUTION<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:16px;font-size:12px;color:#9A98B0;line-height:1.5;\">Each issue gets an evidence screenshot, the conversion risk, and the exact fix branded and ready to attach.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-screen-label=\"Feature grid\" style=\"max-width:1120px;margin:0 auto;padding:88px 24px;\">\n  <div style=\"text-align:center;margin-bottom:52px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4F4DD4;text-transform:uppercase;margin-bottom:12px;\">What gets found<\u002Fdiv>\n    <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-.025em;margin:0;text-wrap:balance;\">One upload. Eight kinds of intelligence.<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;\">\n    <sc-for list=\"{{ features }}\" as=\"f\" hint-placeholder-count=\"8\">\n      <div style=\"border:1px solid #E2E0DB;border-radius:14px;background:#fff;padding:22px;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;\" style-hover=\"transform:translateY(-4px);box-shadow:0 16px 36px -20px rgba(26,25,34,.28);border-color:#B9B8EC;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4F4DD4;margin-bottom:12px;\">{{ f.tag }}<\u002Fdiv>\n        <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:16.5px;margin-bottom:8px;\">{{ f.title }}<\u002Fdiv>\n        <div style=\"font-size:13.5px;line-height:1.5;color:#5A5866;\">{{ f.desc }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"compare\" data-screen-label=\"Comparison\" style=\"background:#fff;border-top:1px solid #ECEBE7;border-bottom:1px solid #ECEBE7;\">\n  <div style=\"max-width:1000px;margin:0 auto;padding:88px 24px;\">\n    <div style=\"text-align:center;margin-bottom:52px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4F4DD4;text-transform:uppercase;margin-bottom:12px;\">The difference<\u002Fdiv>\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-.025em;margin:0 0 14px;text-wrap:balance;\">Enrichment tools tell you who to email.<br>Not why.<\u002Fh2>\n      <p style=\"font-size:16px;color:#5A5866;max-width:560px;margin:0 auto;text-wrap:pretty;\">Clay, Apollo and friends are great at contact data. But \"found your email on the internet\" isn't a pitch. The pitch is what's broken on their website.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E2E0DB;border-radius:16px;overflow-x:auto;\">\n    <div style=\"min-width:680px;\">\n      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1.15fr;background:#FCFCFB;border-bottom:1px solid #E2E0DB;font-size:13.5px;font-weight:600;\">\n        <div style=\"padding:16px 20px;color:#6E6C7A;\">What you get<\u002Fdiv>\n        <div style=\"padding:16px 12px;text-align:center;color:#6E6C7A;\">Manual research<\u002Fdiv>\n        <div style=\"padding:16px 12px;text-align:center;color:#6E6C7A;\">Enrichment tools<\u002Fdiv>\n        <div style=\"padding:16px 12px;text-align:center;background:#4F4DD4;color:#fff;\">LeadIntelligence<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ compareRows }}\" as=\"r\" hint-placeholder-count=\"7\">\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1.15fr;border-bottom:1px solid #EEEDE9;font-size:14px;\">\n          <div style=\"padding:14px 20px;font-weight:500;\">{{ r.label }}<\u002Fdiv>\n          <div style=\"padding:14px 12px;text-align:center;color:#71707E;\">{{ r.manual }}<\u002Fdiv>\n          <div style=\"padding:14px 12px;text-align:center;color:#71707E;\">{{ r.tools }}<\u002Fdiv>\n          <div style=\"padding:14px 12px;text-align:center;background:#F4F4FD;color:#4F4DD4;font-weight:600;\">{{ r.us }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"faq\" data-screen-label=\"FAQ\" style=\"max-width:760px;margin:0 auto;padding:88px 24px;\">\n  <div style=\"text-align:center;margin-bottom:44px;\">\n    <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-.025em;margin:0;\">Questions<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:12px;\">\n    <sc-for list=\"{{ faqs }}\" as=\"q\" hint-placeholder-count=\"6\">\n      <details style=\"border:1px solid #E2E0DB;border-radius:13px;background:#fff;padding:0 22px;\">\n        <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 0;font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:16.5px;\">{{ q.q }}<span class=\"faq-chev\" style=\"color:#71707E;font-size:20px;font-weight:400;transition:transform .2s;flex-shrink:0;\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 0 20px;font-size:15px;line-height:1.6;color:#5A5866;\">{{ q.a }}<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"waitlist\" data-screen-label=\"Final CTA\" style=\"background:#1A1922;color:#FAFAF8;\">\n  <div style=\"max-width:760px;margin:0 auto;padding:96px 24px;text-align:center;\">\n    <div style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid #35334A;border-radius:99px;padding:6px 14px;font-size:13px;font-weight:600;color:#CDCCDA;margin-bottom:24px;\"><span style=\"color:#DA552F;\">▲<\u002Fspan> Product Hunt · July 23<\u002Fdiv>\n    <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:clamp(30px,6vw,44px);letter-spacing:-.03em;line-height:1.12;margin:0 0 16px;text-wrap:balance;\">Your next 100 cold emails could each open with a reason.<\u002Fh2>\n    <p style=\"font-size:17px;color:#A9A7B8;margin:0 0 34px;text-wrap:pretty;\">Join the waitlist now. Early access members get 50% off at launch with code <span style=\"font-family:'JetBrains Mono',monospace;color:#FAFAF8;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:5px;font-size:14.5px;\">{{ discountCode }}<\u002Fspan><\u002Fp>\n    <sc-if value=\"{{ footNotJoined }}\" hint-placeholder-val=\"{{ true }}\">\n    <form sc-camel-on-submit=\"{{ joinFoot }}\" style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:480px;margin:0 auto;\">\n      <input class=\"dark-input\" ref=\"{{ footEmailRef }}\" type=\"email\" required=\"required\" placeholder=\"you@youragency.com\" style=\"flex:1;min-width:220px;padding:14px 18px;border-radius:11px;border:1px solid #45435C;background:#232230;color:#FAFAF8;font-size:15px;font-family:'Instrument Sans',sans-serif;outline:none;\" style-focus=\"border-color:#8B89F0;\">\n      <button type=\"submit\" style=\"background:#4F4DD4;color:#fff;border:none;padding:14px 24px;border-radius:11px;font-size:15px;font-weight:600;font-family:'Instrument Sans',sans-serif;cursor:pointer;white-space:nowrap;\" style-hover=\"background:#8B89F0;\">Get early access<\u002Fbutton>\n    <\u002Fform>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ footJoined }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:inline-flex;align-items:center;gap:10px;background:rgba(30,122,56,.18);border:1px solid #2E7A44;color:#7DD494;padding:14px 24px;border-radius:11px;font-size:15px;font-weight:600;\">✓ You're on the list — see you on launch day.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#1A1922;border-top:1px solid #2B2A3C;color:#9A98B0;\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:28px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:13.5px;\">\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <div style=\"width:22px;height:22px;border-radius:6px;background:#4F4DD4;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:11px;\">Li<\u002Fdiv>\n      <span style=\"color:#CDCCDA;font-weight:600;\">LeadIntelligence<\u002Fspan>\n      <span style=\"opacity:.5;\">· bugbreaker.com<\u002Fspan>\n    <\u002Fdiv>\n    <div>© 2026 · Launching on <a href=\"https://www.producthunt.com\" style=\"color:#CDCCDA;\">Product Hunt<\u002Fa> July 23<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showBanner&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Launch&quot;}, &quot;discountCode&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;HUNT50&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Launch&quot;}}\">\nclass Component extends DCLogic {\n  state = { heroJoined: false, footJoined: false };\n  heroEmailRef = React.createRef();\n  footEmailRef = React.createRef();\n  submitEmail(email) {\n    fetch('https://formspree.io/f/mnjevgyy', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n      body: JSON.stringify({ email, source: 'waitlist' }),\n    }).catch(() => {});\n  }\n  renderVals() {\n    const launch = new Date('2026-07-23T00:00:00');\n    const daysLeft = Math.max(0, Math.ceil((launch - new Date()) / 86400000));\n    return {\n      showBanner: this.props.showBanner ?? true,\n      discountCode: this.props.discountCode ?? 'HUNT50',\n      daysLeft,\n      heroJoined: this.state.heroJoined,\n      heroNotJoined: !this.state.heroJoined,\n      footJoined: this.state.footJoined,\n      footNotJoined: !this.state.footJoined,\n      heroEmailRef: this.heroEmailRef,\n      footEmailRef: this.footEmailRef,\n      joinHero: (e) => { e.preventDefault(); const el = this.heroEmailRef.current; if (el?.checkValidity()) { this.submitEmail(el.value); this.setState({ heroJoined: true }); } },\n      joinFoot: (e) => { e.preventDefault(); const el = this.footEmailRef.current; if (el?.checkValidity()) { this.submitEmail(el.value); this.setState({ footJoined: true }); } },\n      features: [\n        { tag: 'STACK-01', title: 'Tech stack detection', desc: 'CMS, frameworks, hosting  WordPress, Shopify, Webflow and 100+ more.' },\n        { tag: 'STACK-02', title: 'CRM & booking tools', desc: 'HubSpot, NexHealth, Calendly.\\nknow what they already pay for.' },\n        { tag: 'SPEND-03', title: 'Paid tools & ad pixels', desc: 'Google Ads, Meta Pixel, Hotjar.\\nClarity proof they spend on marketing.' },\n        { tag: 'CRO-04', title: 'CRO issue scan', desc: 'Missing CTAs, carousel heroes, weak value props ranked high / medium / low.' },\n        { tag: 'SEO-05', title: 'SEO issue scan', desc: 'Schema gaps, heading structure, meta titles, OG tags with the exact fix.' },\n        { tag: 'WHO-06', title: 'Decision-maker finder', desc: 'Name, role, seniority, email and LinkedIn the person who signs off.' },\n        { tag: 'MSG-07', title: 'Personalized emails', desc: 'A short, specific email written per lead referencing their actual issues and tech stack.' },\n        { tag: 'PDF-08', title: 'Mini audit PDF', desc: 'A branded per lead CRO audit with evidence screenshots, ready to attach.' },\n      ],\n      compareRows: [\n        { label: 'Decision-maker email', manual: 'Hours of digging', tools: '✓', us: '✓' },\n        { label: 'Tech stack & paid tools', manual: 'Per site lookups', tools: 'Partial', us: '✓' },\n        { label: 'SEO & CRO issues found', manual: 'If you audit each site', tools: '✗', us: '✓ Ranked by severity' },\n        { label: 'A reason to reach out', manual: 'Your judgment call', tools: '✗', us: '✓ Evidence-backed' },\n        { label: 'Email written per lead', manual: '✗', tools: 'Generic templates', us: '✓ Issue-specific' },\n        { label: 'Audit PDF to attach', manual: 'Hours in Figma', tools: '✗', us: '✓ Per lead' },\n        { label: 'Time for 100 leads', manual: 'Days', tools: 'Hours + setup', us: 'Minutes' },\n      ],\n      faqs: [\n        { q: 'What do I need to upload?', a: 'Any CSV or Excel with a website URL column. Business name, phone and address help but aren’t required we fill in the rest from the website itself.' },\n        { q: 'Where does the contact data come from?', a: 'Public sources: the company website, Hunter.io. \\nEvery decision maker row shows the source, role and seniority so you can verify before sending.' },\n        { q: 'Are the CRO and SEO issues real, or AI guesses?', a: 'Each issue comes from an actual inspection of the rendered page with the pixel position, the element involved, and an evidence screenshot in the audit PDF. If we can’t prove it, we don’t report it.' },\n        { q: 'Can I white-label the audit PDF?', a: 'That’s the plan for launch your logo, your colors, your sender name. Waitlist members get white labeling first.' },\n        { q: 'Does it send the emails too?', a: 'No, we write them, you send them from your own tools (Instantly, Smartlead, Gmail, anything). Your deliverability stays yours.' },\n        { q: 'When does early access open?', a: 'We launch on Product Hunt July 23. Waitlist members get access first, plus 50% off launch pricing.' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
